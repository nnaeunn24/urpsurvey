<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>설문조사 이동 중</title>

  <script type="module">
    import { assignBalancedCondition } from "./firebase.js";

    const params = new URLSearchParams(window.location.search);

    let participantId =
      params.get("pid") ||
      localStorage.getItem("participantId");

    let condition =
      params.get("condition") ||
      localStorage.getItem("condition");

    if (!participantId) {
      participantId = "u_" + crypto.randomUUID();
    }

    if (!condition) {
      condition = await assignBalancedCondition(participantId);
    }

    localStorage.setItem("participantId", participantId);
    localStorage.setItem("condition", condition);

    window.location.replace(
      `./survey.html?pid=${participantId}&condition=${condition}`
    );
  </script>
</head>

<body>
  <p>설문 페이지로 이동 중입니다...</p>
</body>
</html>
