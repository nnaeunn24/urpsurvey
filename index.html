<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>설문 이동</title>

  <script>
    const params = new URLSearchParams(window.location.search);

    let pid = params.get("pid") || localStorage.getItem("participantId");
    let condition = params.get("condition") || localStorage.getItem("condition");

    if (!pid) {
      pid = "u_" + crypto.randomUUID();
    }

    if (!condition) {
      const CONDITIONS = ["A", "B", "C", "D"];
      condition = CONDITIONS[Math.floor(Math.random() * CONDITIONS.length)];
    }

    localStorage.setItem("participantId", pid);
    localStorage.setItem("condition", condition);

    window.location.replace(
      `./survey.html?pid=${pid}&condition=${condition}`
    );
  </script>
</head>

<body>
  <p>설문 페이지로 이동 중입니다...</p>
</body>
</html>
